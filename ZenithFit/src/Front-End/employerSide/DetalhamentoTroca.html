<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Detalhes da Troca</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#0d141b] dark:text-white">
    <div class="relative flex min-h-screen w-full group/design-root overflow-x-hidden">
        
        <aside class="flex w-64 flex-col border-r border-slate-200 dark:border-slate-800 bg-black p-4 font-display">
            <div class="flex items-center gap-3 p-2 mb-4">
                <h2 class="text-lg font-bold text-white">Admin Panel</h2>
            </div>
            <div class="flex flex-col justify-between flex-grow">
                <div class="flex flex-col gap-1">
                    <a href="AnaliseVendas.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-white/10">
                        <span class="material-symbols-outlined">bar_chart</span>
                        <p class="text-sm font-medium leading-none">Análise de Vendas</p>
                    </a>
                    <a href="GestaoClientes.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-white/10">
                        <span class="material-symbols-outlined">group</span>
                        <p class="text-sm font-medium leading-normal">Clientes</p>
                    </a>
                    <a href="GestaoPedidos.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-white/10">
                        <span class="material-symbols-outlined">shopping_cart</span>
                        <p class="text-sm font-medium leading-normal">Pedidos</p>
                    </a>
                    <a href="DashboardCamisa.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-white/10">
                        <span class="material-symbols-outlined">inventory_2</span>
                        <p class="text-sm font-medium leading-normal">Produtos</p>
                    </a>
                    <a href="GestaoTrocas.html" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/20 text-white">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">sync_alt</span>
                        <p class="text-sm font-medium leading-normal">Trocas</p>
                    </a>
                </div>
                <div class="flex flex-col gap-1">
                    <div class="flex items-center gap-3 p-3 mt-4 border-t border-slate-800">
                        <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10" data-alt="Avatar of Admin User" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBHPIQYwxnJ5P-25YnRHu5hJDz9WOGBE8hsCjpeHqD0nhZjoO4v8kLY5srs7GVCQBOyE2nOQQ2z-V2TMj8sF-VOyhVtM8U0rgIyork-vsTGSHF_CrXgqbNHNo0l3sKfFAkvdn8KsZ35QjS7vv3swukZxYzMRw_pO0hFs3E6epXk2HujtYkgj3OAeSIkg_NfwBLkax8dN5aTDgjuurKs3LtT2zXdVE1E7vIDanhwL0AseXGrj30BKsLM7pT5OqB5c9SkN26QJo8WBLiE");'></div>
                        <div class="flex flex-col">
                            <h2 class="text-white text-sm font-medium leading-normal">Admin User</h2>
                            <p class="text-slate-400 text-xs font-normal leading-normal">admin@example.com</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-auto">
            <header class="flex h-16 shrink-0 items-center justify-between whitespace-nowrap border-b border-gray-200 bg-white px-8 dark:border-gray-800 dark:bg-[#1a242f]">
                <div class="flex items-center gap-4">
                    <a href="GestaoTrocas.html" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 dark:text-gray-300 dark:hover:text-white">
                        <span class="material-symbols-outlined">arrow_back</span>
                        <span class="text-sm font-medium">Voltar</span>
                    </a>
                </div>
            </header>

            <div class="p-8">
                <div class="mx-auto max-w-7xl">
                    <div class="mb-6">
                        <p class="text-[#0d141b] dark:text-white text-4xl font-black leading-tight tracking-[-0.033em]">Detalhes da Troca</p>
                        <p id="subtitulo-troca" class="text-gray-500 dark:text-gray-400 mt-1">Solicitação #...</p>
                    </div>

                    <div id="conteudo-dinamico">
                        <!-- Preenchido pelo JavaScript -->
                        <div class="text-center py-12 text-gray-500">Carregando detalhes da troca...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>



    <script>
        const API = "http://localhost:3000";
        const idTroca = new URLSearchParams(window.location.search).get('id');
        let trocaAtual = null;

        // Elemento container principal
        const container = document.getElementById('conteudo-dinamico');

        const STATUS_MAP = {
            "Pendente": { cor: "yellow", label: "Pendente", acoes: ["autorizar", "recusar"] },
            "Autorizada": { cor: "green", label: "Autorizada", acoes: ["receber"] },
            "Recusada": { cor: "red", label: "Recusada", acoes: [] },
            "Finalizada": { cor: "slate", label: "Finalizada", acoes: [] },
        };

        async function carregarDetalhes() {
            if (!idTroca) {
                container.innerHTML = '<p class="text-red-500 text-center py-12">ID da troca não informado.</p>';
                return;
            }

            try {
                const resposta = await fetch(`${API}/trocas/${idTroca}`);
                if (!resposta.ok) throw new Error("Troca não encontrada.");
                trocaAtual = await resposta.json();
                renderizarDetalhes(trocaAtual);
            } catch (erro) {
                container.innerHTML = `<p class="text-red-500 text-center py-12">Erro: ${erro.message}</p>`;
            }
        }

       function renderizarDetalhes(troca) {
    document.getElementById('subtitulo-troca').textContent = `Solicitação #TRC-${troca.cd_troca}`;

    const statusInfo = STATUS_MAP[troca.status] || { cor: "gray", label: troca.status, acoes: [] };
    const dataPedido = troca.pedido.data ? new Date(troca.pedido.data).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }) : "—";
    const valorPedido = Number(troca.pedido.valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const item = troca.item;
    const imagemItem = item?.imagem || 'images/placeholder.png';
    const nomeItem = item?.nome || 'Item não especificado';
    const tamanhoItem = item?.tamanho || '—';
    const valorUnitario = item?.valor_unitario ? Number(item.valor_unitario).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : '—';

    // Cupom
    const cupom = troca.cupom;
    let cupomHTML;
    if (cupom) {
        cupomHTML = `
            <div class="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-lg p-4 flex flex-wrap items-center justify-between bg-gray-50 dark:bg-gray-800/50 gap-4">
                <div>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Código do Cupom</p>
                    <p class="text-2xl font-bold text-primary tracking-widest" id="codigo-cupom">${cupom.codigo}</p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Valor</p>
                    <p class="text-2xl font-bold text-gray-800 dark:text-white">${Number(cupom.valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</p>
                </div>
                <button onclick="copiarCupom()" class="h-10 px-4 flex items-center gap-2 rounded-md bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-sm font-medium text-gray-800 dark:text-gray-200 transition-colors">
                    <span class="material-symbols-outlined text-base">content_copy</span>
                    Copiar
                </button>
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-3">O cliente foi notificado com as instruções para a devolução do item e o cupom de troca.</p>
        `;
    } else {
        cupomHTML = `
            <div class="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-lg p-4 bg-gray-50 dark:bg-gray-800/50">
                <p class="text-sm text-gray-500 dark:text-gray-400">Cupom ainda não gerado. Será criado automaticamente quando a troca for autorizada.</p>
            </div>
        `;
    }

    const botoesAcao = gerarBotoesAcao(statusInfo.acoes);

    container.innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 flex flex-col gap-6">
                <div class="rounded-xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-slate-900">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Dados da compra original</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                        <div>
                            <p class="text-gray-500 dark:text-gray-400">Nº do Pedido</p>
                            <p class="font-medium text-gray-800 dark:text-gray-200">#${troca.pedido.numero}</p>
                        </div>
                        <div>
                            <p class="text-gray-500 dark:text-gray-400">Data da Compra</p>
                            <p class="font-medium text-gray-800 dark:text-gray-200">${dataPedido}</p>
                        </div>
                        <div>
                            <p class="text-gray-500 dark:text-gray-400">Cliente</p>
                            <p class="font-medium text-gray-800 dark:text-gray-200">${troca.pedido.cliente || "—"}</p>
                        </div>
                        <div>
                            <p class="text-gray-500 dark:text-gray-400">Valor Total</p>
                            <p class="font-medium text-gray-800 dark:text-gray-200">${valorPedido}</p>
                        </div>
                    </div>
                </div>

                <div class="rounded-xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-slate-900">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Item solicitado para troca</h3>
                    <div class="flex items-start gap-4">
                        <div class="w-24 h-24 bg-gray-100 dark:bg-gray-800 rounded-lg bg-cover bg-center" style="background-image: url('${imagemItem}');"></div>
                        <div class="flex-1">
                            <p class="font-semibold text-gray-800 dark:text-gray-200">${nomeItem}</p>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Tamanho: ${tamanhoItem}</p>
                            <p class="font-medium text-gray-800 dark:text-gray-200 mt-1">${valorUnitario}</p>
                        </div>
                    </div>
                </div>

                <div class="rounded-xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-slate-900">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-2">Motivo informado pelo cliente</h3>
                    <p class="text-gray-600 dark:text-gray-300 italic">"${troca.descricao || troca.motivo}"</p>
                </div>

                <div class="rounded-xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-slate-900">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Cupom de Troca</h3>
                    ${cupomHTML}
                </div>
            </div>

            <div class="lg:col-span-1 flex flex-col gap-6">
                <div class="rounded-xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-slate-900">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Status atual</h3>
                    <div class="flex items-center">
                        <span class="inline-flex rounded-full bg-${statusInfo.cor}-100 dark:bg-${statusInfo.cor}-900/50 px-4 py-1.5 text-xs font-bold uppercase tracking-wider text-${statusInfo.cor}-800 dark:text-${statusInfo.cor}-300">
                            ${statusInfo.label}
                        </span>
                    </div>
                </div>

                <div class="rounded-xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-slate-900" id="acoes-container">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Ações</h3>
                    <div class="flex flex-col gap-3">
                        ${botoesAcao}
                    </div>
                </div>

                <div class="rounded-xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-slate-900">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Registrar observações</h3>
                    <textarea id="observacao" class="w-full rounded-lg border-gray-200 bg-white p-3 text-sm text-gray-900 placeholder:text-gray-400 focus:border-primary focus:ring-1 focus:ring-primary dark:border-gray-700 dark:bg-gray-800 dark:text-white outline-none" placeholder="Adicione notas internas aqui..." rows="4"></textarea>
                    <button onclick="salvarObservacao()" class="mt-3 w-full flex h-10 items-center justify-center gap-x-2 rounded-lg border border-gray-300 bg-white px-5 text-sm font-bold text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 transition-all">
                        Salvar Observação
                    </button>
                </div>
            </div>
        </div>
    `;
}

        function gerarBotoesAcao(acoes) {
            let html = '';
            if (acoes.includes('autorizar')) {
                html += `<button onclick="atualizarStatusTroca(2, 'autorizeModal')" class="w-full flex h-11 items-center justify-center gap-x-2 rounded-lg bg-primary px-5 text-sm font-bold text-white hover:bg-primary/90 shadow-sm transition-all"><span class="material-symbols-outlined text-xl">thumb_up</span><span>Autorizar Troca</span></button>`;
            }
            if (acoes.includes('receber')) {
                html += `<button onclick="atualizarStatusTroca(4, 'receiveModal')" class="w-full flex h-11 items-center justify-center gap-x-2 rounded-lg border border-gray-300 bg-white px-5 text-sm font-bold text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 transition-all"><span class="material-symbols-outlined text-xl">inventory_2</span><span>Confirmar Recebimento</span></button>`;
            }
            if (acoes.includes('recusar')) {
                html += `<button onclick="atualizarStatusTroca(3, 'rejectModal')" class="w-full flex h-11 items-center justify-center gap-x-2 rounded-lg border border-red-200 bg-red-50 text-sm font-bold text-red-600 hover:bg-red-100 dark:bg-red-900/20 dark:text-red-400 dark:border-red-900/30 dark:hover:bg-red-900/40 transition-all"><span class="material-symbols-outlined text-xl">cancel</span><span>Recusar Troca</span></button>`;
            }
            if (!html) {
                html = '<p class="text-sm text-gray-500">Nenhuma ação disponível.</p>';
            }
            return html;
        }

        // Função para atualizar o status da troca (1=Pendente, 2=Autorizada, 3=Recusada, 4=Finalizada)
        async function atualizarStatusTroca(novoStatus, modalId) {
            if (!trocaAtual) return;
            try {
                const resposta = await fetch(`${API}/trocas/${trocaAtual.cd_troca}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cd_status_troca: novoStatus })
                });
                if (!resposta.ok) throw new Error("Falha ao atualizar.");
                // Recarrega os detalhes para refletir o novo status
                await carregarDetalhes();
                openModal(modalId);
            } catch (erro) {
                alert("Erro: " + erro.message);
            }
        }

        function copiarCupom() {
            const codigo = document.getElementById('codigo-cupom')?.textContent;
            if (codigo) {
                navigator.clipboard.writeText(codigo).then(() => openModal('copyModal'));
            }
        }

        function salvarObservacao() {
            // Apenas simula por enquanto (pode ser expandido para uma rota específica)
            openModal('noteModal');
        }

        function openModal(modalId) {
            document.getElementById(modalId)?.classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId)?.classList.add('hidden');
        }

        // Inicialização

             function openModal(modalId) {
        document.getElementById(modalId).classList.remove('hidden');
      }

      function closeModal(modalId) {
        document.getElementById(modalId).classList.add('hidden');
      }
        document.addEventListener('DOMContentLoaded', carregarDetalhes);
    </script>
</body>
</html>
