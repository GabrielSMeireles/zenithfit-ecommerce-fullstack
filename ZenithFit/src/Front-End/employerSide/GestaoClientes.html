<body class="font-display bg-background-light dark:bg-background-dark">

        <div class="flex flex-1 flex-col overflow-y-auto">
            <main class="flex-1 p-6 lg:p-8">
                <div class="mx-auto max-w-7xl">
                    <div class="mb-6">
                        <p class="text-[#0d141b] dark:text-white text-4xl font-black leading-tight tracking-[-0.033em]">
                            Gestão de Clientes</p>
                    </div>
                    <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center">
                        <div class="flex-1">
                            <label class="flex h-12 w-full flex-col">
                                <div class="flex h-full w-full flex-1 items-stretch rounded-lg">
                                    <div
                                        class="text-gray-500 dark:text-gray-400 flex items-center justify-center rounded-l-lg border border-r-0 border-gray-300 bg-white pl-4 dark:border-gray-700 dark:bg-gray-800">
                                        <span class="material-symbols-outlined">search</span>

                                    <input id="input-busca" oninput="filtrarClientes()"

                    <div
                        class="overflow-hidden rounded-xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-[#1a242f]">
                        <div class="overflow-x-auto">
                            <table class="min-w-full table-auto divide-y divide-gray-200 text-sm dark:divide-gray-800">
                                <thead class="bg-gray-50 dark:bg-gray-800/50">

                                            Nome</th>

        <div id="personalDataModal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
            <div
                class="bg-white dark:bg-slate-900 rounded-xl shadow-lg w-full max-w-2xl p-6 sm:p-8 max-h-[90vh] overflow-y-auto">
                <div class="flex justify-between items-start mb-4">
                    <h2 class="text-xl sm:text-2xl font-semibold text-slate-900 dark:text-gray-100">Alteração de Dados
                        Pessoais</h2>
                    <button type="button" onclick="closeModal('personalDataModal')"
                        class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <form id="editForm">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nome
                                Completo</label>
                            <input id="edit-nome"
                                class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 dark:text-gray-200"
                                type="text" />
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Data de
                                    Nascimento</label>
                                <input id="edit-nascimento"
                                    class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 dark:text-gray-200"
                                    type="date" />
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">CPF</label>
                                <input id="edit-cpf"
                                    class="w-full bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 dark:text-gray-400"
                                    type="text" readonly />
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                                <input id="edit-email"
                                    class="w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 dark:text-gray-200"
                                    type="text" />

                            </div>

                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Gênero</label>
                                <select id="edit-genero"
                                    class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 dark:text-gray-200">
                                    <option value="1">Feminino</option>
                                    <option value="2">Masculino</option>
                                    <option value="3">Não informar</option>
                                    <option value="4">Outro</option>
                                </select>
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Status</label>
                                <select id="edit-status"
                                    class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 dark:text-gray-200">
                                    <option value="1">Ativo</option>
                                    <option value="2">Inativo</option>
                                </select>
                            </div>
                        </div>

                        <fieldset>
                            <legend class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Telefone
                            </legend>
                            <div class="grid grid-cols-1 sm:grid-cols-12 gap-x-4 gap-y-4">
                                <div class="sm:col-span-4">
                                    <select id="edit-tipo-tel"
                                        class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2">
                                        <option value="1">Celular</option>
                                        <option value="2">Residencial</option>
                                        <option value="3">Comercial</option>
                                    </select>
                                </div>
                                <div class="sm:col-span-2">
                                    <input id="edit-ddd"
                                        class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md text-center px-3 py-2"
                                        placeholder="DDD" type="text" />
                                </div>
                                <div class="sm:col-span-6">
                                    <input id="edit-telefone"
                                        class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2"
                                        placeholder="00000-0000" type="tel" />
                                </div>
                            </div>
                        </fieldset>

                        <div class="pt-4 border-t border-gray-200 dark:border-gray-700">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nova Senha
                                (deixe em branco para não alterar)</label>
                            <div class="relative">
                                <input id="edit-senha"
                                    class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md px-3 py-2 dark:text-gray-200"
                                    type="password" placeholder="Digite a nova senha..." />
                            </div>
                        </div>

                        <fieldset class="border-t border-gray-200 dark:border-gray-700 pt-4">
                            <legend class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Endereços
                                Cadastrados</legend>

                            <div id="container-enderecos-edit" class="space-y-6">
                            </div>
                        </fieldset>
                    </div>

                    <div
                        class="mt-6 pt-4 border-t border-gray-200 dark:border-gray-700 flex flex-col sm:flex-row-reverse gap-4">
                        <button type="button" onclick="salvarAlteracoes()"
                            class="w-full sm:w-auto inline-flex justify-center rounded-md border border-transparent shadow-sm px-6 py-3 bg-primary text-base font-medium text-white hover:bg-primary/90 transition-colors">Salvar</button>
                        <button type="button" onclick="closeModal('personalDataModal')"
                            class="w-full sm:w-auto inline-flex justify-center rounded-md border border-gray-300 dark:border-gray-800 shadow-sm px-6 py-3 bg-white dark:bg-gray-800 text-base font-medium text-gray-700 dark:text-gray-200">Cancelar</button>
                    </div>
                </form>

       <script>
    let todosOsClientes = [];

    async function carregarClientes() {
        try {
            const resposta = await fetch('http://localhost:3000/clientes');
            todosOsClientes = await resposta.json();
            renderizarTabela(todosOsClientes);
        } catch (erro) { console.error("Erro:", erro); }
    }

    function renderizarTabela(lista) {
        const tbody = document.querySelector('table tbody');
        tbody.innerHTML = '';
        lista.forEach(cliente => {
            const statusAtivo = cliente.cd_status === 1;
            const statusClass = statusAtivo ? 'bg-green-100 text-green-800 dark:bg-green-900/50' : 'bg-gray-100 text-gray-800 dark:bg-gray-700';
            const dotClass = statusAtivo ? 'bg-green-500' : 'bg-gray-500';

            tbody.innerHTML += `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50">
                    <td class="whitespace-nowrap px-6 py-4 font-medium text-gray-900 dark:text-white">${cliente.nm_nome_cliente}</td>
                    <td class="whitespace-nowrap px-6 py-4 text-gray-500 dark:text-gray-300">${cliente.nm_email}</td>
                    <td class="whitespace-nowrap px-6 py-4 text-gray-500 dark:text-gray-300">${cliente.cd_cpf}</td>
                    <td class="whitespace-nowrap px-6 py-4">
                        <span class="inline-flex items-center gap-1.5 rounded-full ${statusClass} px-2 py-1 text-xs font-medium">
                            <span class="size-1.5 rounded-full ${dotClass}"></span>
                            ${statusAtivo ? 'Ativo' : 'Inativo'}
                        </span>
                    </td>
                    <td class="whitespace-nowrap px-6 py-4">
                        <div class="flex items-center gap-4">
                            <button onclick="editarCliente('${cliente.cd_cpf}')" class="flex items-center gap-1 text-sm font-medium text-gray-600 hover:text-primary dark:text-gray-300">
                                <span class="material-symbols-outlined text-base">edit</span> Editar
                            </button>
                            <button onclick="excluirCliente('${cliente.cd_cpf}')" class="flex items-center gap-1 text-sm font-medium text-gray-600 hover:text-red-600 dark:text-gray-300">
                                <span class="material-symbols-outlined text-base">delete</span> Excluir
                            </button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    async function editarCliente(cpf) {
        try {
            const resposta = await fetch(`http://localhost:3000/clientes/${cpf}`);
            const cliente = await resposta.json();

            // Preenche dados básicos
            document.getElementById('edit-nome').value = cliente.nm_nome_cliente || '';
            document.getElementById('edit-cpf').value = cliente.cd_cpf || '';
            document.getElementById('edit-email').value = cliente.nm_email || '';
            document.getElementById('edit-ddd').value = cliente.cd_DDD || '';
            document.getElementById('edit-telefone').value = cliente.cd_telefone || '';
            document.getElementById('edit-genero').value = cliente.cd_genero || 1;
            document.getElementById('edit-status').value = cliente.cd_status ?? 1;
            document.getElementById('edit-tipo-tel').value = cliente.cd_tipo_telefone || 1;
            document.getElementById('edit-senha').value = '';

            // Formata data para o input date (YYYY-MM-DD)
            if (cliente.dt_nascimento) {
                document.getElementById('edit-nascimento').value = cliente.dt_nascimento.split('T')[0];
            }

            const container = document.getElementById('container-enderecos-edit');
            container.innerHTML = ''; 

            if (cliente.enderecos && cliente.enderecos.length > 0) {
                cliente.enderecos.forEach((end, index) => {
                    const htmlEndereco = `
                        <div class="endereco-item p-4 border rounded-lg bg-gray-50 dark:bg-gray-800/50 relative mb-4">
                            <p class="text-xs font-bold text-primary mb-2 uppercase">Endereço ${index + 1}</p>
                            <div class="grid grid-cols-1 sm:grid-cols-6 gap-4">
                                <div class="sm:col-span-6">
                                    <label class="block text-xs text-gray-500">Tipo</label>
                                    <select class="edit-tipo-endereco w-full bg-white dark:bg-gray-800 border rounded-md px-3 py-2 text-sm dark:text-white">
                                        <option value="Cobrança" ${end.nm_tipo_endereco === 'Cobrança' ? 'selected' : ''}>Cobrança</option>
                                        <option value="Entrega" ${end.nm_tipo_endereco === 'Entrega' ? 'selected' : ''}>Entrega</option>
                                        <option value="Ambos" ${end.nm_tipo_endereco === 'Ambos' ? 'selected' : ''}>Ambos</option>
                                    </select>
                                </div>
                                <div class="sm:col-span-2">
                                    <label class="block text-xs text-gray-500">CEP</label>
                                    <input class="edit-cep w-full bg-white dark:bg-gray-800 border rounded-md px-3 py-2 text-sm dark:text-white" type="text" value="${end.cd_cep || ''}" />
                                </div>
                                <div class="sm:col-span-4">
                                    <label class="block text-xs text-gray-500">Logradouro</label>
                                    <input class="edit-logradouro w-full bg-white dark:bg-gray-800 border rounded-md px-3 py-2 text-sm dark:text-white" type="text" value="${end.nm_logradouro || ''}" />
                                </div>
                                <div class="sm:col-span-2">
                                    <label class="block text-xs text-gray-500">Número</label>
                                    <input class="edit-numero w-full bg-white dark:bg-gray-800 border rounded-md px-3 py-2 text-sm dark:text-white" type="text" value="${end.cd_numero || ''}" />
                                </div>
                                <div class="sm:col-span-2">
                                    <label class="block text-xs text-gray-500">Bairro</label>
                                    <input class="edit-bairro w-full bg-white dark:bg-gray-800 border rounded-md px-3 py-2 text-sm dark:text-white" type="text" value="${end.nm_bairro || ''}" />
                                </div>
                                <div class="sm:col-span-2">
                                    <label class="block text-xs text-gray-500">Cidade</label>
                                    <input class="edit-cidade w-full bg-white dark:bg-gray-800 border rounded-md px-3 py-2 text-sm dark:text-white" type="text" value="${end.nm_cidade || ''}" />
                                </div>
                                <div class="sm:col-span-2">
                                    <label class="block text-xs text-gray-500">UF</label>
                                    <input class="edit-uf w-full bg-white dark:bg-gray-800 border rounded-md px-3 py-2 text-sm dark:text-white" type="text" maxlength="2" value="${end.sg_estado || ''}" />
                                </div>
                            </div>
                        </div>`;
                    container.innerHTML += htmlEndereco;
                });
            }

            document.getElementById('personalDataModal').classList.remove('hidden');
        } catch (erro) { 
            console.error(erro);
            alert("Erro ao carregar dados do cliente."); 
        }
    }

    async function salvarAlteracoes() {
        const cpf = document.getElementById('edit-cpf').value;
        const novaSenha = document.getElementById('edit-senha').value;

        // Captura todos os endereços do modal
        const blocosEndereco = document.querySelectorAll('.endereco-item');
        const listaEnderecos = Array.from(blocosEndereco).map(bloco => ({
            nm_tipo_endereco: bloco.querySelector('.edit-tipo-endereco').value,
            cd_cep: bloco.querySelector('.edit-cep').value,
            nm_logradouro: bloco.querySelector('.edit-logradouro').value,
            cd_numero: bloco.querySelector('.edit-numero').value,
            nm_bairro: bloco.querySelector('.edit-bairro').value,
            nm_cidade: bloco.querySelector('.edit-cidade').value,
            sg_uf: bloco.querySelector('.edit-uf').value
        }));

        const dadosAtualizados = {
            nm_nome_cliente: document.getElementById('edit-nome').value,
            dt_nascimento: document.getElementById('edit-nascimento').value,
            cd_genero: parseInt(document.getElementById('edit-genero').value),
            nm_email: document.getElementById('edit-email').value,
            cd_status: parseInt(document.getElementById('edit-status').value),
            cd_tipo_telefone: parseInt(document.getElementById('edit-tipo-tel').value),
            cd_DDD: document.getElementById('edit-ddd').value,
            cd_telefone: document.getElementById('edit-telefone').value,
            enderecos: listaEnderecos // Enviando o array completo
        };

        if (novaSenha.trim() !== "") {
            dadosAtualizados.nm_senha = novaSenha;
        }

        try {
            const res = await fetch(`http://localhost:3000/clientes/${cpf}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dadosAtualizados)
            });

            if (res.ok) {
                alert("Dados atualizados com sucesso!");
                closeModal('personalDataModal');
                carregarClientes();
            } else {
                alert("Erro ao salvar no servidor.");
            }
        } catch (e) { alert("Erro de conexão com o servidor."); }
    }

    function filtrarClientes() {
        const termo = document.getElementById('input-busca').value.toLowerCase();
        renderizarTabela(todosOsClientes.filter(c =>
            c.nm_nome_cliente.toLowerCase().includes(termo) || c.cd_cpf.includes(termo)
        ));
    }

    async function excluirCliente(cpf) {
        if (confirm("Tem certeza que deseja excluir este cliente?")) {
            try {
                const response = await fetch(`http://localhost:3000/clientes/${cpf}`, { method: 'DELETE' });
                if (response.ok) {
                    alert("Cliente removido!");
                    carregarClientes();
                }
            } catch (e) { alert("Erro ao conectar ao servidor."); }
        }
    }

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    window.onload = carregarClientes;
</script>
</body>
