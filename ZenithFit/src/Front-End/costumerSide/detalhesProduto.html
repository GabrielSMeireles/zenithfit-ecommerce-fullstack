<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Detalhe da Camisa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#18181B",
                        "background-light": "#F8F8F8",
                        "background-dark": "#121212",
                    },
                    fontFamily: { display: ["Inter", "sans-serif"] },
                    borderRadius: { DEFAULT: "0.5rem" },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-zinc-800 dark:text-zinc-200" style="font-family: 'Inter', sans-serif;">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-black/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="homepage.html" class="flex items-center flex-shrink-0">
                    <img alt="Zenith Logo" class="h-12" src="images/logo-zenith.png" />
                </a>
                <nav class="hidden md:flex items-center space-x-8 text-sm font-medium">
                    <a class="hover:text-primary transition-colors" href="homepage.html">Home</a>
                    <a class="hover:text-primary flex items-center gap-1 transition-colors" href="produtos.html">Shop <span class="material-symbols-outlined text-sm">expand_more</span></a>
                    <a class="hover:text-primary transition-colors" href="novidades.html">Novidades</a>
                    <a class="hover:text-primary transition-colors" href="assistente.html">Assistente</a>
                </nav>
                <div class="flex items-center space-x-4">
                    <a href="dashboardCliente.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                        <span class="material-symbols-outlined">account_circle</span>
                    </a>
                    <!-- Ícone do carrinho com badge de quantidade -->
                    <a href="carrinho.html" class="relative p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                        <span class="material-symbols-outlined">shopping_cart</span>
                        <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <main class="py-12 md:py-16">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-16">

                <!-- GALERIA -->
                <div class="flex flex-col-reverse md:flex-row gap-4">
                    <div id="thumbnails" class="flex md:flex-col gap-3 justify-center md:justify-start">
                        <img alt="Thumb 1" class="w-20 h-20 md:w-24 md:h-24 object-cover rounded-lg cursor-pointer border-2 border-primary" src="images/mahoraga.png" />
                        <img alt="Thumb 2" class="w-20 h-20 md:w-24 md:h-24 object-cover rounded-lg cursor-pointer border-2 border-transparent hover:border-zinc-300" src="images/mahoraga.png" />
                        <img alt="Thumb 3" class="w-20 h-20 md:w-24 md:h-24 object-cover rounded-lg cursor-pointer border-2 border-transparent hover:border-zinc-300" src="images/mahoraga.png" />
                    </div>
                    <div class="flex-1">
                        <img id="main-image" alt="Produto" class="w-full h-auto object-cover rounded-xl" src="images/mahoraga.png" />
                    </div>
                </div>

                <!-- INFORMAÇÕES DO PRODUTO -->
                <div class="flex flex-col">
                    <div>
                        <h1 id="produto-nome" class="text-4xl font-extrabold text-zinc-900 dark:text-white mt-1">Carregando...</h1>
                        <p id="produto-preco" class="text-2xl font-bold text-zinc-800 dark:text-zinc-200 mt-2">—</p>
                    </div>

                    <div class="mt-6">
                        <p id="produto-descricao" class="text-zinc-600 dark:text-zinc-300 leading-relaxed">—</p>
                        <ul class="mt-4 space-y-2 text-sm text-zinc-600 dark:text-zinc-400">
                            <li><span class="font-semibold text-zinc-700 dark:text-zinc-300">Tecido:</span> 100% Algodão Premium</li>
                            <li><span class="font-semibold text-zinc-700 dark:text-zinc-300">Caimento:</span> Oversized</li>
                        </ul>
                    </div>

                    <div class="mt-8 space-y-6">
                        <!-- TAMANHO -->
                        <div>
                            <div class="flex justify-between items-center">
                                <h3 class="text-sm font-semibold text-zinc-800 dark:text-zinc-200">Tamanho</h3>
                                <a class="text-sm font-medium text-zinc-500 hover:text-zinc-700" href="#">Guia de Medidas</a>
                            </div>
                            <div id="tamanhos" class="grid grid-cols-4 gap-2 mt-2">
                                <button data-tamanho="P"  class="tamanho-btn px-4 py-2 border border-zinc-300 dark:border-zinc-700 rounded-lg text-sm font-medium hover:bg-zinc-100 dark:hover:bg-zinc-800">P</button>
                                <button data-tamanho="M"  class="tamanho-btn px-4 py-2 border bg-primary text-white rounded-lg text-sm font-medium">M</button>
                                <button data-tamanho="G"  class="tamanho-btn px-4 py-2 border border-zinc-300 dark:border-zinc-700 rounded-lg text-sm font-medium hover:bg-zinc-100 dark:hover:bg-zinc-800">G</button>
                                <button data-tamanho="GG" class="tamanho-btn px-4 py-2 border border-zinc-300 dark:border-zinc-700 rounded-lg text-sm font-medium hover:bg-zinc-100 dark:hover:bg-zinc-800">GG</button>
                            </div>
                        </div>

                        <!-- QUANTIDADE + ESTOQUE -->
                        <div class="flex items-end gap-4">
                            <div>
                                <label class="text-sm font-semibold text-zinc-800 dark:text-zinc-200">Quantidade</label>
                                <div class="flex items-center border border-zinc-300 dark:border-zinc-700 rounded-lg mt-2">
                                    <button id="btn-menos" class="px-3 py-2 text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-l-lg">-</button>
                                    <input id="quantity" class="w-12 text-center bg-transparent border-x border-zinc-300 dark:border-zinc-700 focus:ring-0 focus:outline-none" type="text" value="1" />
                                    <button id="btn-mais" class="px-3 py-2 text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-r-lg">+</button>
                                </div>
                            </div>
                            <div id="estoque-status" class="flex items-center text-sm text-green-600 dark:text-green-400">
                                <span class="material-symbols-outlined mr-1 text-base">check_circle</span>
                                <span id="estoque-texto">Em estoque</span>
                            </div>
                        </div>
                    </div>

                    <!-- BOTÃO ADICIONAR AO CARRINHO -->
                    <div class="mt-8">
                        <!--
                            CORREÇÃO PRINCIPAL:
                            Substituído <a href="carrinho.html"> por <button type="button">.
                            Um link navega imediatamente ao ser clicado, impedindo que o
                            localStorage seja salvo antes do redirecionamento.
                            Agora o JS salva o item e SÓ ENTÃO redireciona manualmente.
                        -->
                        <button
                            id="btn-carrinho"
                            type="button"
                            class="w-full bg-primary text-white font-bold py-3 px-6 rounded-lg text-base hover:opacity-90 transition-opacity flex items-center justify-center gap-2"
                        >
                            <span class="material-symbols-outlined text-xl">shopping_cart</span>
                            <span>Adicionar ao Carrinho</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = "http://localhost:3000";
        let produtoAtual = null;

        // ── CARREGAR PRODUTO ──────────────────────────────────────────────
        async function carregarProduto() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");

            if (!id) {
                document.querySelector("main").innerHTML = `<p class="text-center py-20 text-slate-400">Produto não encontrado.</p>`;
                return;
            }

            try {
                const res = await fetch(`${API}/produtos/${id}`);
                if (!res.ok) throw new Error("Produto não encontrado");
                const produto = await res.json();
                produtoAtual = produto;
                renderizarProduto(produto);
                atualizarBadgeCarrinho();
            } catch (e) {
                console.error(e);
                document.querySelector("main").innerHTML = `<p class="text-center py-20 text-slate-400">Erro ao carregar produto.</p>`;
            }
        }

        // ── RENDERIZAR PRODUTO ────────────────────────────────────────────
        function renderizarProduto(produto) {
            const imagem = produto.nm_imagem_url || 'images/placeholder.png';
            const semEstoque = produto.qt_estoque === 0;

            // Textos
            document.getElementById('produto-nome').textContent = produto.nm_produto;
            document.getElementById('produto-preco').textContent =
                `R$ ${Number(produto.vl_produto).toFixed(2).replace('.', ',')}`;
            document.getElementById('produto-descricao').textContent =
                produto.ds_produto || "Sem descrição disponível.";

            // Imagens
            document.getElementById('main-image').src = imagem;
            document.getElementById('main-image').alt = produto.nm_produto;
            document.querySelectorAll('#thumbnails img').forEach(img => {
                img.src = imagem;
                img.alt = produto.nm_produto;
            });

            // Estoque
            const statusEl   = document.getElementById('estoque-status');
            const textoEl    = document.getElementById('estoque-texto');
            const btnCarrinho = document.getElementById('btn-carrinho');

            if (semEstoque) {
                statusEl.className = "flex items-center text-sm text-red-500 dark:text-red-400";
                statusEl.querySelector('span.material-symbols-outlined').textContent = 'cancel';
                textoEl.textContent = "Sem estoque";
                btnCarrinho.disabled = true;
                btnCarrinho.classList.add("opacity-50", "cursor-not-allowed");
                btnCarrinho.querySelector('span:last-child').textContent = "Produto esgotado";
            } else {
                textoEl.textContent = `Em estoque (${produto.qt_estoque})`;
            }
        }

        // ── SELEÇÃO DE TAMANHO ────────────────────────────────────────────
        let tamanhoSelecionado = "M";

        document.querySelectorAll('.tamanho-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                tamanhoSelecionado = btn.dataset.tamanho;
                document.querySelectorAll('.tamanho-btn').forEach(b => {
                    b.className = "tamanho-btn px-4 py-2 border border-zinc-300 dark:border-zinc-700 rounded-lg text-sm font-medium hover:bg-zinc-100 dark:hover:bg-zinc-800";
                });
                btn.className = "tamanho-btn px-4 py-2 border bg-primary text-white rounded-lg text-sm font-medium";
            });
        });

        // ── CONTROLE DE QUANTIDADE ────────────────────────────────────────
        document.getElementById('btn-mais').addEventListener('click', () => {
            const input = document.getElementById('quantity');
            input.value = parseInt(input.value || 1) + 1;
        });

        document.getElementById('btn-menos').addEventListener('click', () => {
            const input = document.getElementById('quantity');
            const val = parseInt(input.value || 1);
            if (val > 1) input.value = val - 1;
        });

        // ── ADICIONAR AO CARRINHO ─────────────────────────────────────────
        /*
            CORREÇÃO:
            O campo salvo agora é sempre 'vl_unitario' (Number),
            alinhado com o que carrinho.html e checkoutPagamento.html esperam.
            Antes usava 'vl_produto', causando NaN nos totais.
        */
        document.getElementById('btn-carrinho').addEventListener('click', () => {
            if (!produtoAtual) return;
            if (produtoAtual.qt_estoque === 0) return;

            const quantidade = parseInt(document.getElementById('quantity').value) || 1;
            const carrinho   = JSON.parse(localStorage.getItem('carrinho') || '[]');

            const itemExistente = carrinho.find(i =>
                i.cd_produto === produtoAtual.cd_produto &&
                i.nm_tamanho === tamanhoSelecionado
            );

            if (itemExistente) {
                itemExistente.qt_item += quantidade;
            } else {
                carrinho.push({
                    cd_produto:    produtoAtual.cd_produto,
                    nm_produto:    produtoAtual.nm_produto,
                    vl_unitario:   Number(produtoAtual.vl_produto), // campo correto
                    nm_imagem_url: produtoAtual.nm_imagem_url || '',
                    nm_tamanho:    tamanhoSelecionado,
                    qt_item:       quantidade
                });
            }

            localStorage.setItem('carrinho', JSON.stringify(carrinho));

            // Feedback visual antes de navegar
            const btn = document.getElementById('btn-carrinho');
            const textoOriginal = btn.querySelector('span:last-child').textContent;
            btn.querySelector('span:last-child').textContent = "Adicionado!";
            btn.disabled = true;

            setTimeout(() => {
                btn.querySelector('span:last-child').textContent = textoOriginal;
                btn.disabled = false;
                atualizarBadgeCarrinho();
                // Redireciona SOMENTE após salvar no localStorage
                window.location.href = 'carrinho.html';
            }, 600);
        });

        // ── BADGE DO CARRINHO NO ÍCONE ────────────────────────────────────
        function atualizarBadgeCarrinho() {
            const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
            const total = carrinho.reduce((acc, i) => acc + i.qt_item, 0);
            const badge = document.getElementById('cart-badge');
            if (!badge) return;
            if (total > 0) {
                badge.textContent = total;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        carregarProduto();
    </script>

</body>
</html>
