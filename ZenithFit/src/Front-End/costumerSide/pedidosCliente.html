    </main>
    <script>

        const container = document.getElementById('pedidos-container');
        let todosPedidos = [];

        const cpfLogado = localStorage.getItem('cliente_cpf');
        async function carregarPedidos() {
            try {
                container.innerHTML = '<p class="text-center text-zinc-500 col-span-full py-12">Carregando pedidos...</p>';
                const resposta = await fetch(`http://localhost:3000/pedidos/${cpfLogado}`);
                if (!resposta.ok) throw new Error('Erro ao carregar pedidos');
                const pedidos = await resposta.json();
                todosPedidos = pedidos;
                renderizarPedidos(pedidos);
            }
            catch (erro) {
                console.error('Erro:', erro);
            }

        }


        function renderizarPedidos(pedidos) {
    container.innerHTML = '';
    
    if (pedidos.length === 0) {
        container.innerHTML = '<p class="text-center text-zinc-500 col-span-full py-12">Nenhum pedido encontrado.</p>';
        return;
    }
    
    container.innerHTML = pedidos.map(pedido => {
        const data = new Date(pedido.dt_pedido).toLocaleDateString('pt-BR', {
            day: '2-digit', month: 'short', year: 'numeric'
        });
        
        const valor = Number(pedido.vl_total).toLocaleString('pt-BR', {
            style: 'currency', currency: 'BRL'
        });
        
        const statusNome = pedido.status_pedido?.nm_status || 'Desconhecido';
        
        const coresStatus = {
            'Em Processamento': 'yellow',
            'Aprovada': 'blue',
            'Em Trânsito': 'purple',
            'Entregue': 'green',
            'Cancelado': 'red'
        };
        const cor = coresStatus[statusNome] || 'gray';
        
        const imagem = pedido.itens?.[0]?.produto?.nm_imagem_url || 'images/placeholder.png';
        
        return `
            <div class="bg-white dark:bg-zinc-900 rounded-lg border border-zinc-200 dark:border-zinc-800 overflow-hidden flex flex-col">
                <img alt="Imagem do pedido" class="w-full h-64 object-cover" src="${imagem}" />
                <div class="p-6 flex flex-col flex-grow">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="font-bold text-lg text-zinc-900 dark:text-white">Pedido #${pedido.cd_pedido}</p>
                            <p class="text-sm text-zinc-500 dark:text-zinc-400">${data}</p>
                        </div>
                        <span class="inline-flex items-center bg-${cor}-100 dark:bg-${cor}-900/40 text-${cor}-800 dark:text-${cor}-300 text-xs font-medium px-2.5 py-0.5 rounded-full">
                            <span class="w-2 h-2 me-1.5 bg-${cor}-500 rounded-full"></span>${statusNome}
                        </span>
                    </div>
                    <div class="mt-auto flex justify-between items-end">
                        <div>
                            <p class="text-sm text-zinc-500 dark:text-zinc-400">Valor Total</p>
                            <p class="text-xl font-bold text-zinc-900 dark:text-white">${valor}</p>
                        </div>
                        <a class="font-semibold text-primary dark:text-white hover:underline text-sm" href="detalhesDoPedido.html?id=${pedido.cd_pedido}">
                            Ver Detalhes
                        </a>
                    </div>
                </div>
            </div>
        `;
    }).join(''); 
}
function filtrarPedidos(){

    const termoBusca= document.getElementById('search-input').value.trim().toLowerCase();

    if(termoBusca ==='')
    {
        renderizarPedidos(todosPedidos);
        return; 
    }

    const filtrados = todosPedidos.filter(pedido => {
    const numeroPedido = String(pedido.cd_pedido);
    const statusPedido = (pedido.status_pedido?.nm_status || '').toLowerCase();
    
    return numeroPedido.includes(termoBusca) || statusPedido.includes(termoBusca);
});
    
    renderizarPedidos(filtrados);
}
    document.getElementById('search-input').addEventListener('input', filtrarPedidos);

carregarPedidos();


    </script>
    </div>

</body>
