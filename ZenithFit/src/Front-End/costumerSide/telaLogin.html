<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Login / Registro - Zenith</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#262626",
            "background-light": "#F5F5F5",
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "8px",
          },
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    body {
          font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('loginApp', () => ({
      activeTab: 'login',
      userRole: 'cliente',
      enderecos: [{ id: Date.now() }],
      cartoes: [{ id: Date.now() }],

      // ... dentro do seu Alpine.data
      async realizarLogin(e) {
        const form = e.target;
        const email = form.email.value;
        const senha = form.password.value;

        try {
          // Você precisará criar essa rota no seu Back-end para validar email/senha
          const response = await fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
          });

          if (response.ok) {
            const user = await response.json();

            // O SEGREDO ESTÁ AQUI: Salva o CPF para uso posterior
            localStorage.setItem('user_cpf', user.cd_cpf);
            localStorage.setItem('user_name', user.nm_nome_cliente);

            alert(`Bem-vindo, ${user.nm_nome_cliente}!`);
            window.location.href = 'homepage.html';
          } else {
            alert('Email ou senha incorretos.');
          }
        } catch (err) {
          alert('Erro ao conectar com o servidor.');
        }
      },

      async enviarCadastro(e) {
        const form = e.target;
        const formData = new FormData(form);

        const listaCartoes = this.cartoes.map((_, index) => ({
          cd_numero_cartao: form.querySelectorAll('[name="card-number"]')[index]?.value,
          nm_nome_impresso_cartao: form.querySelectorAll('[name="card-name"]')[index]?.value,
          cd_seguranca: form.querySelectorAll('[name="card-cvv"]')[index]?.value,
          dt_validade_cartao: form.querySelectorAll('[name="card-expiry"]')[index]?.value
            ? new Date(form.querySelectorAll('[name="card-expiry"]')[index].value + '-01T00:00:00')
            : new Date(),
          cd_bandeira: Number(form.querySelectorAll('[name="card-brand"]')[index]?.value || 1),
          cartao_preferencial: form.querySelectorAll('[name="card-preferred"]')[index]?.checked || false
        }));

        const listaEnderecos = this.enderecos.map((_, index) => ({
          nm_tipo_endereco: form.querySelectorAll('[name="address-type"]')[index]?.value,
          cd_cep: form.querySelectorAll('[name="zip-code"]')[index]?.value,
          nm_logradouro: form.querySelectorAll('[name="street"]')[index]?.value,
          cd_numero: form.querySelectorAll('[name="number"]')[index]?.value,
          nm_bairro: form.querySelectorAll('[name="neighborhood"]')[index]?.value,
          nm_cidade: form.querySelectorAll('[name="city"]')[index]?.value,
          sg_estado: form.querySelectorAll('[name="state"]')[index]?.value
        }));

        const data = {
          cpf: formData.get('cpf'),
          nm_nome_cliente: formData.get('full-name'),
          dt_nascimento: formData.get('birth-date') ? new Date(formData.get('birth-date') + 'T00:00:00') : new Date(),
          cd_DDD: formData.get('ddd'),
          cd_telefone: formData.get('phone-number'),
          nm_email: formData.get('register-email-address'),
          cd_senha: formData.get('password'),
          cd_genero: formData.get('gender') === 'masculino' ? 1 : (formData.get('gender') === 'feminino' ? 2 : 3),
          cd_tipo_telefone: formData.get('phone-type') === 'Celular' ? 1 : 2,
          nm_identificacao_telefone: 'Principal',
          cd_status: 1,
          enderecos: listaEnderecos,
          cartoes: listaCartoes
        };

        try {
          const response = await fetch('http://localhost:3000/clientes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          if (response.ok) {
            alert('Cadastro realizado com sucesso!');
            window.location.href = 'homepage.html';
          } else {
            const res = await response.json();
            alert('Erro: ' + (res.message || 'Erro no servidor'));
          }
        } catch (err) {
          alert('Erro ao conectar com o servidor.');
        }
      }
    }));
  });
</script>

<body class="bg-background-light font-display text-neutral-800" x-data="loginApp">

  <div class="min-h-screen flex flex-col">

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
      <div class="max-w-3xl w-full space-y-8 bg-white p-8 sm:p-10 rounded-lg shadow-md">
        <div class="text-center">
          <h2 class="text-3xl font-bold text-neutral-900">
            Acesse sua conta ou cadastre-se
          </h2>
          <p class="mt-2 text-sm text-neutral-500">Escolha seu tipo de acesso para continuar</p>
        </div>
        <div class="flex justify-center mt-6">
          <div class="inline-flex p-1 bg-neutral-100 rounded-lg w-full max-w-sm">
            <button
              :class="userRole === 'cliente' ? 'bg-white shadow-sm text-primary' : 'text-neutral-500 hover:text-neutral-700'"
              @click="userRole = 'cliente'"
              class="flex-1 flex items-center justify-center gap-2 py-2.5 text-sm font-semibold rounded-md transition-all duration-200 focus:outline-none">
              <span class="material-symbols-outlined text-[20px]">person</span>
              Cliente
            </button>
            <button
              :class="userRole === 'colaborador' ? 'bg-white shadow-sm text-primary' : 'text-neutral-500 hover:text-neutral-700'"
              @click="userRole = 'colaborador'"
              class="flex-1 flex items-center justify-center gap-2 py-2.5 text-sm font-semibold rounded-md transition-all duration-200 focus:outline-none">
              <span class="material-symbols-outlined text-[20px]">badge</span>
              Colaborador
            </button>
          </div>
        </div>
        <div class="flex border-b border-neutral-200">
          <button
            :class="{ 'border-primary text-primary': activeTab === 'login', 'border-transparent text-neutral-500 hover:text-neutral-700 hover:border-neutral-300': activeTab !== 'login' }"
            @click="activeTab = 'login'"
            class="w-1/2 py-4 px-1 text-center border-b-2 font-medium text-sm transition-colors duration-200 focus:outline-none">
            ENTRAR
          </button>
          <button
            :class="{ 'border-primary text-primary': activeTab === 'register', 'border-transparent text-neutral-500 hover:text-neutral-700 hover:border-neutral-300': activeTab !== 'register' }"
            @click="activeTab = 'register'"
            class="w-1/2 py-4 px-1 text-center border-b-2 font-medium text-sm transition-colors duration-200 focus:outline-none">
            CRIAR CONTA
          </button>
        </div>
        <!-- Procure a div x-show="activeTab === 'login'" -->
        <div x-show="activeTab === 'login'" ...>
          <form class="mt-8 space-y-6" @submit.prevent="realizarLogin($event)">
            <div class="rounded-md shadow-sm -space-y-px">
              <!-- Campo Email para Cliente -->
              <div x-show="userRole === 'cliente'">
                <label class="sr-only" for="login-email-address">Email</label>
                <input autocomplete="email" id="login-email-address" name="email"
                  class="appearance-none rounded-t-md relative block w-full px-3 py-3 border border-neutral-300 placeholder-neutral-500 text-neutral-900 focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
                  placeholder="Email" :required="userRole === 'cliente' && activeTab === 'login'" type="email" />
              </div>

              <!-- Campo Matrícula para Colaborador -->
              <div x-show="userRole === 'colaborador'">
                <label class="sr-only" for="login-id">Matrícula</label>
                <input id="login-id" name="id_colaborador"
                  class="appearance-none rounded-t-md relative block w-full px-3 py-3 border border-neutral-300 placeholder-neutral-500 text-neutral-900 focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
                  placeholder="Matrícula / ID Colaborador"
                  :required="userRole === 'colaborador' && activeTab === 'login'" type="text" />
              </div>

              <!-- Campo Senha -->
              <div>
                <label class="sr-only" for="login-password">Senha</label>
                <input autocomplete="current-password" id="login-password" name="password" required
                  class="appearance-none rounded-b-md relative block w-full px-3 py-3 border border-neutral-300 placeholder-neutral-500 text-neutral-900 focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
                  placeholder="Senha" type="password" />
              </div>
            </div>

            <div>
              <button type="submit"
                class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-neutral-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
                <span x-text="userRole === 'cliente' ? 'Entrar como Cliente' : 'Entrar como Colaborador'"></span>
              </button>
            </div>
          </form>
        </div>
        <div x-show="activeTab === 'register'" x-transition:enter="transition ease-out duration-200"
          x-transition:enter-end="opacity-100 transform translate-y-0"
          x-transition:enter-start="opacity-0 transform -translate-y-2">
          <form class="mt-8" @submit.prevent="enviarCadastro($event)">
            <div class="space-y-6">
              <div class="border-b border-neutral-200 pb-6">
                <h3 class="text-lg font-semibold leading-6 text-neutral-900">Informações Pessoais</h3>
                <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-neutral-700" for="full-name">Nome Completo</label>
                    <input
                      class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                      id="full-name" name="full-name" required="" type="text" />
                  </div>
                  <div class="md:col-span-2" x-show="userRole === 'colaborador'">
                    <label class="block text-sm font-medium text-neutral-700" for="reg-id">Matrícula / ID
                      Colaborador</label>
                    <input :required="userRole === 'colaborador'"
                      class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                      id="reg-id" name="id_colaborador" type="text" />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-neutral-700" for="gender">Gênero</label>
                    <select
                      class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-white"
                      id="gender" name="gender" required="">
                      <option disabled="" selected="" value="">Selecione</option>
                      <option value="masculino">Masculino</option>
                      <option value="feminino">Feminino</option>
                      <option value="outro">Outro</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-neutral-700" for="birth-date">Data de
                      Nascimento</label>
                    <input
                      class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                      id="birth-date" name="birth-date" required="" type="date" />
                  </div>
                  <div>

                    <!-- Validação do cpf -->
                    <label class="block text-sm font-medium text-neutral-700" for="cpf">CPF</label>
                    <input
                      class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                      id="cpf" name="cpf" placeholder="Somente 11 números" required="" type="text" pattern="\d{11}"
                      title="O CPF deve conter exatamente 11 dígitos numéricos." maxlength="11" />
                    <div>
                      <label class="block text-sm font-medium text-neutral-700" for="phone">Telefone</label>
                      <div class="mt-1 flex rounded-md shadow-sm">
                        <select
                          class="block w-28 flex-shrink-0 rounded-l-md border-neutral-300 focus:border-primary focus:ring-primary sm:text-sm bg-white"
                          id="phone-type" name="phone-type">
                          <option>Celular</option>
                          <option>Fixo</option>
                        </select>
                        <input
                          class="block w-16 flex-1 rounded-none border-y border-l-0 border-r border-neutral-300 bg-transparent px-3 py-2 placeholder-neutral-500 focus:border-primary focus:ring-primary sm:text-sm"
                          id="ddd" name="ddd" placeholder="DDD" type="text" />
                        <input
                          class="block w-full min-w-0 flex-1 rounded-none rounded-r-md border-neutral-300 bg-transparent px-3 py-2 placeholder-neutral-500 focus:border-primary focus:ring-primary sm:text-sm"
                          id="phone-number" name="phone-number" placeholder="Número" type="tel" />
                      </div>
                    </div>
                  </div>
                </div>
                <div class="border-b border-neutral-200 pb-6">
                  <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold leading-6 text-neutral-900"
                      x-text="userRole === 'colaborador' ? 'Endereço Funcional' : 'Endereços'">Endereços</h3>

                    <button type="button" x-show="userRole === 'cliente' && activeTab === 'register'"
                      @click="enderecos.push({ id: Date.now() })"
                      class="text-sm bg-neutral-100 hover:bg-neutral-200 text-primary py-1.5 px-3 rounded-md transition-colors flex items-center gap-1">
                      <span class="material-symbols-outlined text-[18px]">add</span> Adicionar outro endereço
                    </button>
                  </div>


                  <template x-for="(endereco, index) in enderecos" :key="endereco.id">

                    <div :class="{ 'mt-8 pt-6 border-t border-dashed border-neutral-300': index > 0 }">

                      <div class="mt-4 grid grid-cols-1 md:grid-cols-6 gap-x-6 gap-y-4">

                        <button type="button" x-show="enderecos.length > 1"
                          @click="enderecos = enderecos.filter(i => i.id !== endereco.id)"
                          class="text-red-500 hover:text-red-700 flex items-center gap-1 text-xs font-medium transition-colors">
                          <span class="material-symbols-outlined text-[16px]">delete</span>
                          Remover
                        </button>

                        <div class="md:col-span-6">
                          <label class="block text-sm font-medium text-neutral-700">Tipo de Endereço</label>
                          <select name="address-type" required
                            class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-white">
                            <option value="Cobrança">Cobrança</option>
                            <option value="Entrega">Entrega</option>
                            <option value="Ambos">Ambos</option>
                          </select>
                        </div>

                        <div class="md:col-span-2">
                          <label class="block text-sm font-medium text-neutral-700">CEP</label>
                          <input
                            class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                            name="zip-code" required type="text" />
                        </div>

                        <div class="md:col-span-4">
                          <label class="block text-sm font-medium text-neutral-700">Rua / Logradouro</label>
                          <input
                            class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                            name="street" required type="text" />
                        </div>

                        <div class="md:col-span-2">
                          <label class="block text-sm font-medium text-neutral-700">Número</label>
                          <input
                            class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                            name="number" required type="text" />
                        </div>

                        <div class="md:col-span-4">
                          <label class="block text-sm font-medium text-neutral-700">Bairro</label>
                          <input
                            class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                            name="neighborhood" required type="text" />
                        </div>

                        <div class="md:col-span-3">
                          <label class="block text-sm font-medium text-neutral-700">Cidade</label>
                          <input
                            class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                            name="city" required type="text" />
                        </div>

                        <div class="md:col-span-3">
                          <label class="block text-sm font-medium text-neutral-700">Estado</label>
                          <input
                            class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                            name="state" required type="text" />
                        </div>
                      </div>
                    </div>
                  </template>
                  <div class="border-b border-neutral-200 pb-6 mt-6">
                    <div class="flex justify-between items-center mb-4">
                      <h3 class="text-lg font-semibold leading-6 text-neutral-900">Cartões de Crédito</h3>
                      <button type="button" @click="cartoes.push({ id: Date.now() })"
                        class="text-sm bg-neutral-100 hover:bg-neutral-200 text-primary py-1.5 px-3 rounded-md transition-colors flex items-center gap-1">
                        <span class="material-symbols-outlined text-[18px]">add_card</span> Adicionar Cartão
                      </button>
                    </div>

                    <template x-for="(cartao, index) in cartoes" :key="cartao.id">
                      <div class="mt-4 p-4 border border-neutral-200 rounded-md bg-neutral-50 relative">
                        <button type="button" @click="cartoes = cartoes.filter(c => c.id !== cartao.id)"
                          class="absolute top-2 right-2 text-red-500 hover:text-red-700">
                          <span class="material-symbols-outlined">delete</span>
                        </button>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-neutral-700">Nome Impresso no Cartão</label>
                            <input name="card-name" required type="text"
                              class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm">
                          </div>

                          <div>
                            <label class="block text-sm font-medium text-neutral-700">Número do Cartão</label>
                            <input name="card-number" required type="text" maxlength="16"
                              class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm">
                          </div>

                          <div class="grid grid-cols-2 gap-2">
                            <div>
                              <label class="block text-sm font-medium text-neutral-700">Validade</label>
                              <input name="card-expiry" required type="month"
                                class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm">
                            </div>
                            <div>
                              <label class="block text-sm font-medium text-neutral-700">CVV</label>
                              <input name="card-cvv" required type="text" maxlength="4"
                                class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm">
                            </div>
                          </div>

                          <div>
                            <label class="block text-sm font-medium text-neutral-700">Bandeira</label>
                            <select name="card-brand" required
                              class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm">
                              <option value="1">Mastercard</option>
                              <option value="2">Visa</option>
                              <option value="3">Elo</option>
                            </select>
                          </div>

                          <div class="flex items-center mt-6">
                            <input name="card-preferred" type="checkbox"
                              class="h-4 w-4 text-primary border-neutral-300 rounded focus:ring-primary">
                            <label class="ml-2 block text-sm text-neutral-700">Definir como preferencial</label>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
              <div>
                <h3 class="text-lg font-semibold leading-6 text-neutral-900">Credenciais de Acesso</h3>
                <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-neutral-700"
                      for="register-email-address">E-mail</label>
                    <input autocomplete="email"
                      class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                      id="register-email-address" name="register-email-address" required="" type="email" />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-neutral-700" for="register-password">Senha</label>
                    <input
                      class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                      id="register-password" name="password" required="" type="password" />
                    <div class="mt-2 w-full bg-neutral-200 rounded-full h-1">
                      <div class="password-strength-bar bg-red-500 rounded-full" style="width: 10%"></div>
                    </div>
                    <p class="mt-1 text-xs text-neutral-500">Mínimo 8 caracteres, com maiúsculas, minúsculas e
                      símbolos.</p>
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-neutral-700" for="confirm-password">Confirmar
                      Senha</label>
                    <input
                      class="mt-1 block w-full rounded-md border-neutral-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm bg-transparent"
                      id="confirm-password" name="confirm-password" required="" type="password" />
                  </div>
                </div>
              </div>
            </div>
            <div class="pt-6">
              <button type="submit"
                class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-neutral-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
                <span
                  x-text="userRole === 'cliente' ? 'Finalizar Cadastro de Cliente' : 'Finalizar Cadastro de Colaborador'"></span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script defer="" src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>

</html>
